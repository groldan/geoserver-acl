name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - 'run_mkdocs.sh'
      - 'setup_mkdocs.sh'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'run_mkdocs.sh'
      - 'setup_mkdocs.sh'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git-revision-date-localized-plugin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Create virtual environment and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Generate diagrams
        run: |
          mkdir -p docs/structurizr/exports
          mkdir -p docs/assets/images/structurizr
          chmod +x docs/structurizr/generate-diagrams.sh
          chmod +x docs/structurizr/plantuml-generate-svg.sh
          cd docs/structurizr
          ./generate-diagrams.sh
        # Add a conditional to handle case where diagram generation might fail but should not stop the build
        continue-on-error: true

      - name: Build MkDocs
        run: |
          source .venv/bin/activate
          mkdocs build
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./site"

  # Deploy job
  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4