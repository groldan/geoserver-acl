<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Background Shield -->
  <path d="M100 10 L180 45 L180 100 C180 150 150 180 100 190 C50 180 20 150 20 100 L20 45 Z" 
        fill="#28728D" stroke="#1E5162" stroke-width="6"/>
  
  <!-- Stylized Globe/Earth - All White -->
  <circle cx="100" cy="100" r="55" fill="#ffffff"/>
  
  <!-- Globe Lines - White Grid -->
  <ellipse cx="100" cy="100" rx="55" ry="55" fill="none" stroke="#ffffff" stroke-width="3"/>
  <ellipse cx="100" cy="100" rx="55" ry="25" fill="none" stroke="#ffffff" stroke-width="3"/>
  <ellipse cx="100" cy="100" rx="35" ry="55" fill="none" stroke="#ffffff" stroke-width="2"/>
  <line x1="45" y1="100" x2="155" y2="100" stroke="#ffffff" stroke-width="3"/>
  <line x1="100" y1="45" x2="100" y2="155" stroke="#ffffff" stroke-width="3"/>
  
  <!-- ACL Checkmark - Green on white space -->
  <path d="M80 100 L95 125 L130 75" fill="none" stroke="#82AB1F" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>